<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comanda Dom Leon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --marrom:     #3B2314;
      --marrom-mid: #5C3D2E;
      --bege:       #F5F0E8;
      --bege-card:  #FFFDF9;
      --verde:      #2D7A4F;
      --vermelho:   #C0392B;
      --texto:      #1A1208;
      --texto-sub:  #7A6855;
      --borda:      #E2D9CC;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bege);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--bege-card);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(59,35,20,0.10);
      border: 1px solid var(--borda);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      gap: 12px;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    .titulo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--marrom);
      text-align: center;
      line-height: 1.2;
    }

    .subtitulo {
      font-size: 13px;
      color: var(--texto-sub);
      text-align: center;
      font-style: italic;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--texto-sub);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      border: 1.5px solid var(--borda);
      border-radius: 10px;
      background: var(--bege);
      color: var(--texto);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--marrom); }
    input::placeholder { color: #C2B9AD; }

    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: var(--marrom);
      color: var(--bege);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-entrar:hover  { background: var(--marrom-mid); }
    .btn-entrar:active { transform: scale(0.98); }
    .btn-entrar:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(245,240,232,0.3);
      border-top-color: var(--bege);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-entrar.loading .spinner  { display: block; }
    .btn-entrar.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .msg-erro {
      margin-top: 14px;
      padding: 10px 14px;
      background: #FDF0EF;
      border-left: 3px solid var(--vermelho);
      border-radius: 6px;
      font-size: 13px;
      color: var(--vermelho);
      display: none;
    }

    .msg-erro.visivel { display: block; }

    .rodape {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--texto-sub);
    }
  </style>
</head>

      <div>
        <div class="titulo">Comanda Dom Leon</div>
        <div class="subtitulo">O melhor do seu dia está aqui!</div>
      </div>
    </div>

    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-entrar" id="btn-entrar" onclick="entrar()">
      <span class="spinner"></span>
      <span class="btn-label">Entrar</span>
    </button>

    <div class="msg-erro" id="msg-erro"></div>
  </div>

  <div class="rodape">Sistema interno · Padaria Dom Leon</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuDpg9yufiKQ_p_KDR2PcY32K8Xh0H_nM",
      authDomain: "comandas-89c57.firebaseapp.com",
      projectId: "comandas-89c57",
      storageBucket: "comandas-89c57.firebasestorage.app",
      messagingSenderId: "885510017154",
      appId: "1:885510017154:web:2c7df4579fe5396de5649b"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    window.entrar = async function () {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btn-entrar');
      const erro  = document.getElementById('msg-erro');

      erro.classList.remove('visivel');

      if (!email || !senha) {
        erro.textContent = 'Preencha e-mail e senha.';
        erro.classList.add('visivel');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        const uid  = cred.user.uid;
        const snap = await getDoc(doc(db, 'usuarios', uid));

        if (!snap.exists()) throw new Error('Usuário não cadastrado no sistema.');

        const perfil = snap.data().perfil;

        const destinos = {
          atendente: 'painel.html',
          caixa:     'caixa.html',
          gerente:   'admin.html'
        };

        window.location.href = destinos[perfil] || 'painel.html';

      } catch (e) {
        const mensagens = {
          'auth/invalid-credential':     'E-mail ou senha incorretos.',
          'auth/user-not-found':         'Usuário não encontrado.',
          'auth/wrong-password':         'Senha incorreta.',
          'auth/too-many-requests':      'Muitas tentativas. Aguarde alguns minutos.',
          'auth/network-request-failed': 'Sem conexão. Verifique o Wi-Fi.'
        };
        erro.textContent = mensagens[e.code] || e.message;
        erro.classList.add('visivel');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.entrar();
    });
  </script>
