<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha · Dom Leon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--marrom:#3B2314;--marrom-mid:#5C3D2E;--bege:#F5F0E8;--bege-card:#FFFDF9;--verde:#2D7A4F;--vermelho:#C0392B;--amarelo:#B8860B;--texto:#1A1208;--texto-sub:#7A6855;--borda:#E2D9CC}
    body{font-family:'DM Sans',sans-serif;background:var(--bege);min-height:100vh;padding-bottom:24px}

    .header{background:var(--marrom);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .header-esq{display:flex;align-items:center;gap:10px}
    .header-logo{width:36px;height:36px;border-radius:50%;object-fit:contain;background:var(--bege);padding:2px}
    .header-titulo{color:var(--bege);font-size:14px;font-weight:500}
    .header-sub{color:#C9B99A;font-size:11px}
    .header-dir{display:flex;align-items:center;gap:10px}
    .status-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80}
    .btn-icon{background:none;border:none;cursor:pointer;color:var(--bege);padding:4px;opacity:.85;display:flex;align-items:center}
    .btn-icon:hover{opacity:1}
    .btn-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    .lista{padding:12px;display:flex;flex-direction:column;gap:12px}
    .vazio{text-align:center;padding:60px 20px;color:var(--texto-sub);font-size:14px}
    .vazio-icon{font-size:40px;margin-bottom:12px;opacity:.4}
    .loading-wrap{text-align:center;padding:60px;color:var(--texto-sub);font-size:13px}

    /* CARD COMANDA */
    .card{background:var(--bege-card);border-radius:14px;border:1.5px solid var(--borda);overflow:hidden;transition:border-color .3s,box-shadow .3s}
    .card.atencao{border-color:var(--amarelo);box-shadow:0 0 0 2px rgba(184,134,11,.12)}
    .card.urgente{border-color:var(--vermelho);box-shadow:0 0 0 3px rgba(192,57,43,.15)}

    .card-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--borda)}
    .ch-esq{}
    .ch-titulo{font-size:15px;font-weight:500;color:var(--texto)}
    .ch-canal{font-size:11px;color:var(--texto-sub);margin-top:2px}

    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer-pulse{width:8px;height:8px;border-radius:50%;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .timer-val{font-size:22px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1}
    .timer-label{font-size:9px;color:var(--texto-sub);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

    /* ITENS */
    .card-itens{padding:6px 14px}
    .item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F5F0E8}
    .item-row:last-child{border-bottom:none}
    .item-cod{font-size:11px;font-family:monospace;color:var(--texto-sub);min-width:38px;font-weight:500}
    .item-nome{font-size:13px;color:var(--texto);flex:1;font-weight:500}

    .status-circle{width:30px;height:30px;border-radius:50%;border:2px solid #C8BFB5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .status-circle:hover{border-color:var(--texto-sub);transform:scale(1.05)}
    .status-circle.verde{border-color:var(--verde);background:var(--verde)}
    .status-circle.vermelho{border-color:var(--vermelho);background:var(--vermelho)}
    .status-circle svg{display:none;width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .status-circle.verde svg.ic-check{display:block}
    .status-circle.vermelho svg.ic-x{display:block}

    /* HINT */
    .card-hint{font-size:10px;color:var(--texto-sub);text-align:center;padding:4px 14px 8px;font-style:italic}

    /* AÇÕES */
    .card-acoes{padding:10px 14px;display:flex;gap:6px;background:#F9F7F4;border-top:1px solid var(--borda)}
    .btn-acao{font-size:12px;font-weight:500;padding:9px 10px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;flex:1;text-align:center;transition:opacity .15s}
    .btn-acao:active{opacity:.8}
    .btn-fazendo{background:var(--marrom);color:var(--bege)}
    .btn-pronto{background:var(--verde);color:#fff}
    .btn-problema{background:#FEF7E0;color:#7A5700;border:1px solid #E2D9CC}
    .btn-rejeitar{background:#FDECEA;color:#8B1A1A;border:1px solid #F5C4C4}

    .badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
    .badge-novo{background:#E8F5EE;color:#1B5E35}
    .badge-fazendo{background:#FEF7E0;color:#7A5700}

    /* MODAL PROBLEMA */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
    .modal-bg.visivel{display:flex}
    .modal{background:var(--bege-card);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;animation:slideUp .22s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-titulo{font-size:15px;font-weight:500;color:var(--texto);margin-bottom:6px}
    .modal-sub{font-size:13px;color:var(--texto-sub);margin-bottom:14px}
    .modal-input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 13px;border:1.5px solid var(--borda);border-radius:10px;background:var(--bege);color:var(--texto);outline:none;resize:none;margin-bottom:14px}
    .modal-input:focus{border-color:var(--marrom)}
    .modal-btns{display:flex;gap:10px}
    .btn-cancelar{flex:1;padding:13px;background:none;border:1.5px solid var(--borda);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--texto-sub);cursor:pointer}
    .btn-enviar-prob{flex:2;padding:13px;background:var(--vermelho);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#fff;cursor:pointer}
  </style>
</head>

    const firebaseConfig={apiKey:"AIzaSyCuDpg9yufiKQ_p_KDR2PcY32K8Xh0H_nM",authDomain:"comandas-89c57.firebaseapp.com",projectId:"comandas-89c57",storageBucket:"comandas-89c57.firebasestorage.app",messagingSenderId:"885510017154",appId:"1:885510017154:web:2c7df4579fe5396de5649b"};

      const q=query(collection(db,'comandas'),where('status','==','em_producao'));
      onSnapshot(q,async(snap)=>{
        const comandas=snap.docs.map(d=>({id:d.id,...d.data()}));
        comandas.sort((a,b)=>(a.enviadoEm?.seconds||0)-(b.enviadoEm?.seconds||0));
        document.getElementById('header-sub').textContent=
          (document.getElementById('header-sub').textContent.split('·')[0].trim())+' · '+comandas.length+' comanda'+(comandas.length!==1?'s':'');

        // Parar timers antigos
        Object.values(timers).forEach(t=>clearInterval(t));
        timers={};

        if(comandas.length===0){
          document.getElementById('lista').innerHTML=
            '<div class="vazio"><div class="vazio-icon">👨‍🍳</div>Nenhuma comanda na fila</div>';
          return;
        }

        // Carregar itens de cada comanda
        const lista=document.getElementById('lista');
        lista.innerHTML='<div class="loading-wrap">Carregando itens...</div>';

        const cards=await Promise.all(comandas.map(async c=>{
          const itensSnap=await getDocs(
            query(collection(db,'comandas',c.id,'itens'),where('statusItem','in',['enviado','em_producao']))
          );
          const itens=itensSnap.docs.map(d=>({id:d.id,...d.data()}));
          return {comanda:c, itens};
        }));

        lista.innerHTML=cards.map(({comanda:c,itens})=>{
          const canais={salao:'Salão',balcao:'Balcão',delivery:'Delivery',calcada:'Calçada'};
          const enviado=c.enviadoEm?.seconds||Math.floor(Date.now()/1000);
          const decorrido=Math.floor(Date.now()/1000)-enviado;
          const cor=decorrido<LIMITE_ATENCAO?COR_VERDE:decorrido<LIMITE_URGENTE?COR_AMARELO:COR_VERMELHO;
          const classe=decorrido<LIMITE_ATENCAO?'':decorrido<LIMITE_URGENTE?'atencao':'urgente';
          const lbl=decorrido<LIMITE_ATENCAO?'tranquilo':decorrido<LIMITE_URGENTE?'atenção':'urgente';

          // Expandir itens por unidade
          const linhas=itens.flatMap(item=>{
            const cod=item.codigoProduto?String(item.codigoProduto).slice(-4).padStart(4,'0'):'----';
            return Array.from({length:item.quantidade||1},(_,i)=>`
              <div class="item-row" data-item-id="${item.id}" data-unidade="${i}">
                <span class="item-cod">${cod}</span>
                <span class="item-nome">${item.nomeProduto}</span>
                <div class="status-circle" onclick="toggleCirculo(this)">
                  <svg class="ic-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                  <svg class="ic-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </div>
              </div>`);
          }).join('');

          const fazendo=c.statusCozinha==='fazendo';
          const acoes=fazendo
            ? `<button class="btn-acao btn-pronto" onclick="marcarPronto('${c.id}')">Pronto ✓</button>
               <button class="btn-acao btn-problema" onclick="abrirProblema('${c.id}','${c.identificacao.replace(/'/g,"\\'")}')">Problema</button>`
            : `<button class="btn-acao btn-fazendo" onclick="marcarFazendo('${c.id}',this)">Fazendo</button>
               <button class="btn-acao btn-problema" onclick="abrirProblema('${c.id}','${c.identificacao.replace(/'/g,"\\'")}')">Problema</button>
               <button class="btn-acao btn-rejeitar" onclick="rejeitar('${c.id}')">Rejeitar</button>`;

          const badge=fazendo
            ? '<span class="badge badge-fazendo">Fazendo</span>'
            : '<span class="badge badge-novo">Novo</span>';

          return `
            <div class="card ${classe}" id="card-${c.id}">
              <div class="card-header">
                <div>
                  <div class="ch-titulo">${c.identificacao}</div>
                  <div class="ch-canal">${canais[c.canal]||c.canal} · ${badge}</div>
                </div>
                <div class="timer-wrap">
                  <div class="timer-pulse" id="pulse-${c.id}" style="background:${cor}"></div>
                  <div>
                    <div class="timer-val" id="timer-${c.id}" style="color:${cor}">${fmtSeg(decorrido)}</div>
                    <div class="timer-label" id="lbl-${c.id}">${lbl}</div>
                  </div>
                </div>
              </div>
              <div class="card-itens">${linhas}</div>
              <div class="card-hint">Toque no círculo para marcar ✓ ok ou ✕ problema</div>
              <div class="card-acoes">${acoes}</div>
            </div>`;
        }).join('');

        // Iniciar timers
        cards.forEach(({comanda:c})=>{
          const enviado=c.enviadoEm?.seconds||Math.floor(Date.now()/1000);
          timers[c.id]=setInterval(()=>{
            const decorrido=Math.floor(Date.now()/1000)-enviado;
            const cor=decorrido<LIMITE_ATENCAO?COR_VERDE:decorrido<LIMITE_URGENTE?COR_AMARELO:COR_VERMELHO;
            const lbl=decorrido<LIMITE_ATENCAO?'tranquilo':decorrido<LIMITE_URGENTE?'atenção':'urgente';
            const classe=decorrido<LIMITE_ATENCAO?'':decorrido<LIMITE_URGENTE?'atencao':'urgente';
            const tv=document.getElementById('timer-'+c.id);
            const pp=document.getElementById('pulse-'+c.id);
            const lb=document.getElementById('lbl-'+c.id);
            const cd=document.getElementById('card-'+c.id);
            if(tv){tv.textContent=fmtSeg(decorrido);tv.style.color=cor;}
            if(pp){pp.style.background=cor;}
            if(lb){lb.textContent=lbl;}
            if(cd){cd.className='card '+classe;}
          },1000);
        });
      });
    }

    function fmtSeg(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

    window.toggleCirculo=function(el){
      if(el.classList.contains('verde')){el.classList.remove('verde');el.classList.add('vermelho');}
      else if(el.classList.contains('vermelho')){el.classList.remove('vermelho');}
      else{el.classList.add('verde');}
    };

    window.marcarFazendo=async function(id,btn){
      await updateDoc(doc(db,'comandas',id),{statusCozinha:'fazendo'});
    };

    window.marcarPronto=async function(id){
      await updateDoc(doc(db,'comandas',id),{
        status:'pronto',
        statusCozinha:'pronto',
        prontoEm:serverTimestamp()
      });
    };

    window.rejeitar=async function(id){
      if(!confirm('Rejeitar esta comanda? Ela voltará para o atendente.')) return;
      await updateDoc(doc(db,'comandas',id),{
        status:'aberta',
        statusCozinha:'rejeitado',
        enviadoEm:null
      });
    };

    window.abrirProblema=function(id,nome){
      comandaProblema=id;
      document.getElementById('modal-prob-sub').textContent=`Comanda: ${nome}`;
      document.getElementById('prob-texto').value='';
      document.getElementById('modal-prob').classList.add('visivel');
      document.getElementById('prob-texto').focus();
    };

    window.fecharModal=function(){
      document.getElementById('modal-prob').classList.remove('visivel');
      comandaProblema=null;
    };

    window.fecharModalFora=function(e){
      if(e.target===document.getElementById('modal-prob')) window.fecharModal();
    };

    window.confirmarProblema=async function(){
      if(!comandaProblema) return;
      const texto=document.getElementById('prob-texto').value.trim();
      if(!texto){document.getElementById('prob-texto').focus();return;}
      await updateDoc(doc(db,'comandas',comandaProblema),{
        status:'aberta',
        statusCozinha:'problema',
        problemaDescricao:texto,
        problemaEm:serverTimestamp(),
        enviadoEm:null
      });
      window.fecharModal();
    };

    document.addEventListener('keydown',e=>{if(e.key==='Escape') window.fecharModal();});
  </script>
</body>
</html>
