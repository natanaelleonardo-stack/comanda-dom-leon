<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios · Dom Leon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--marrom:#3B2314;--marrom-mid:#5C3D2E;--bege:#F5F0E8;--bege-card:#FFFDF9;--verde:#2D7A4F;--texto:#1A1208;--texto-sub:#7A6855;--borda:#E2D9CC}
    body{font-family:'DM Sans',sans-serif;background:var(--bege);min-height:100vh}
    .header{background:var(--marrom);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .header-esq{display:flex;align-items:center;gap:10px}
    .header-logo{width:36px;height:36px;border-radius:50%;object-fit:contain;background:var(--bege);padding:2px}
    .header-titulo{color:var(--bege);font-size:14px;font-weight:500}
    .header-sub{color:#C9B99A;font-size:11px}
    .btn-icon{background:none;border:none;cursor:pointer;color:var(--bege);padding:4px;opacity:.85;display:flex;align-items:center}
    .btn-icon:hover{opacity:1}
    .btn-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .conteudo{padding:16px}
    .filtros{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .filtro{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--borda);background:var(--bege-card);color:var(--texto-sub);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
    .filtro.ativo{background:var(--marrom);color:var(--bege);border-color:var(--marrom)}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .card{background:var(--bege-card);border-radius:12px;border:1px solid var(--borda);padding:12px}
    .card-label{font-size:10px;color:var(--texto-sub);text-transform:uppercase;letter-spacing:.05em}
    .card-val{font-size:22px;font-weight:500;color:var(--marrom);margin-top:4px;line-height:1}
    .card-sub{font-size:11px;color:var(--texto-sub);margin-top:3px}
    .sec-titulo{font-size:11px;font-weight:500;color:var(--texto-sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
    .ranking-item{background:var(--bege-card);border-radius:8px;border:1px solid var(--borda);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .rank-pos{font-size:12px;font-weight:500;color:var(--texto-sub);width:24px}
    .rank-nome{font-size:13px;color:var(--texto);flex:1}
    .rank-qtd{font-size:12px;color:var(--texto-sub);margin-right:10px}
    .rank-val{font-size:13px;font-weight:500;color:var(--marrom)}
    .vazio{text-align:center;padding:32px;color:var(--texto-sub);font-size:13px}
    .loading-wrap{text-align:center;padding:32px;color:var(--texto-sub);font-size:13px}
  </style>
</head>

      <div>
        <div class="header-titulo">Relatórios</div>
        <div class="header-sub" id="header-sub">Dom Leon</div>
      </div>
    </div>
    <button class="btn-icon" onclick="window.location.href='home.html'" title="Início">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
  </div>

  <div class="conteudo">
    <div class="filtros">
      <button class="filtro ativo" onclick="filtrar(this,'hoje')">Hoje</button>
      <button class="filtro" onclick="filtrar(this,'semana')">Semana</button>
      <button class="filtro" onclick="filtrar(this,'mes')">Mês</button>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-label">Comandas</div>
        <div class="card-val" id="rel-qtd">—</div>
        <div class="card-sub">fechadas</div>
      </div>
      <div class="card">
        <div class="card-label">Total vendas</div>
        <div class="card-val" id="rel-total">—</div>
        <div class="card-sub" id="rel-ticket">ticket médio —</div>
      </div>
    </div>
    <div class="sec-titulo">Itens mais vendidos</div>
    <div id="ranking"><div class="loading-wrap">Carregando...</div></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig={apiKey:"AIzaSyCuDpg9yufiKQ_p_KDR2PcY32K8Xh0H_nM",authDomain:"comandas-89c57.firebaseapp.com",projectId:"comandas-89c57",storageBucket:"comandas-89c57.firebasestorage.app",messagingSenderId:"885510017154",appId:"1:885510017154:web:2c7df4579fe5396de5649b"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
    const fmt=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    let periodo='hoje';

    onAuthStateChanged(auth,async(user)=>{
      if (!user){window.location.href='index.html';return;}
      const snap=await getDoc(doc(db,'usuarios',user.uid));
      if (!snap.exists()||snap.data().perfil!=='gerente'){window.location.href='home.html';return;}
      document.getElementById('header-sub').textContent=snap.data().nome||'Gerente';
      carregarRelatorio();
    });

    window.filtrar=function(btn,p){
      document.querySelectorAll('.filtro').forEach(b=>b.classList.remove('ativo'));
      btn.classList.add('ativo'); periodo=p; carregarRelatorio();
    };

    async function carregarRelatorio(){
      document.getElementById('ranking').innerHTML='<div class="loading-wrap">Carregando...</div>';
      const agora=new Date();
      let inicio;
      if (periodo==='hoje'){inicio=new Date(agora);inicio.setHours(0,0,0,0);}
      else if (periodo==='semana'){inicio=new Date(agora);inicio.setDate(agora.getDate()-7);}
      else{inicio=new Date(agora);inicio.setDate(1);inicio.setHours(0,0,0,0);}

      const snap=await getDocs(query(collection(db,'comandas'),where('status','==','fechada'),where('fechadaEm','>=',inicio)));
      const comandas=snap.docs;
      const totalVendas=comandas.reduce((s,d)=>s+(d.data().total||0),0);
      const ticket=comandas.length?totalVendas/comandas.length:0;

      document.getElementById('rel-qtd').textContent=comandas.length;
      document.getElementById('rel-total').textContent=fmt(totalVendas);
      document.getElementById('rel-ticket').textContent='ticket médio '+fmt(ticket);

      const contagem={};
      for (const c of comandas){
        const itens=await getDocs(collection(db,'comandas',c.id,'itens'));
        itens.forEach(i=>{
          const d=i.data(),k=d.nomeProduto;
          if (!contagem[k]) contagem[k]={qtd:0,total:0};
          contagem[k].qtd+=(d.quantidade||0);
          contagem[k].total+=(d.quantidade||0)*(d.precoProduto||0);
        });
      }

      const ranking=Object.entries(contagem).sort((a,b)=>b[1].qtd-a[1].qtd).slice(0,10);
      const el=document.getElementById('ranking');
      if (ranking.length===0){el.innerHTML='<div class="vazio">Sem dados no período.</div>';return;}
      el.innerHTML=ranking.map(([nome,d],i)=>`
        <div class="ranking-item">
          <span class="rank-pos">${i+1}.</span>
          <span class="rank-nome">${nome}</span>
          <span class="rank-qtd">${d.qtd} un</span>
          <span class="rank-val">${fmt(d.total)}</span>
        </div>`).join('');
    }
  </script>
