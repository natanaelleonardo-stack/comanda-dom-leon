<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dom Leon · Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --marrom:#3B2314; --marrom-mid:#5C3D2E; --bege:#F5F0E8; --bege-card:#FFFDF9; --texto:#1A1208; --texto-sub:#7A6855; --borda:#E2D9CC; }
    body { font-family:'DM Sans',sans-serif; background:var(--bege); min-height:100vh; display:flex; flex-direction:column; }
    .header { background:var(--marrom); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
    .header-esq { display:flex; align-items:center; gap:10px; }
    .header-logo { width:36px; height:36px; border-radius:50%; object-fit:contain; background:var(--bege); padding:2px; }
    .header-titulo { color:var(--bege); font-size:14px; font-weight:500; }
    .header-sub { color:#C9B99A; font-size:11px; }
    .btn-sair { background:none; border:none; color:#C9B99A; font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; }
    .btn-sair:hover { color:var(--bege); }
    .conteudo { flex:1; padding:24px 16px; max-width:480px; margin:0 auto; width:100%; }
    .boas-vindas { font-size:13px; color:var(--texto-sub); margin-bottom:20px; }
    .boas-vindas strong { color:var(--texto); font-weight:500; }
    .grade { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modulo { background:var(--bege-card); border-radius:14px; border:1px solid var(--borda); padding:20px 14px 16px; display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; transition:border-color 0.15s,transform 0.1s; text-decoration:none; }
    .modulo:hover { border-color:var(--marrom); }
    .modulo:active { transform:scale(0.97); }
    .modulo.bloqueado { opacity:0.38; cursor:not-allowed; pointer-events:none; }
    .mod-icone { width:52px; height:52px; background:var(--bege); border-radius:12px; border:1px solid var(--borda); display:flex; align-items:center; justify-content:center; }
    .mod-icone svg { width:26px; height:26px; stroke:var(--marrom); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .mod-nome { font-size:13px; font-weight:500; color:var(--texto); text-align:center; }
    .mod-sub { font-size:11px; color:var(--texto-sub); text-align:center; line-height:1.3; }
    .mod-lock { display:none; }
    .modulo.bloqueado .mod-lock { display:block; }
    .modulo.bloqueado .mod-sub { display:none; }
    .mod-lock svg { width:14px; height:14px; stroke:var(--texto-sub); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .loading-wrap { text-align:center; padding:60px 20px; color:var(--texto-sub); font-size:13px; grid-column:1/-1; }
  </style>
</head>
