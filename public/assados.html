<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assados · Dom Leon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--marrom:#3B2314;--marrom-mid:#5C3D2E;--bege:#F5F0E8;--bege-card:#FFFDF9;--verde:#2D7A4F;--vermelho:#C0392B;--amarelo:#B8860B;--texto:#1A1208;--texto-sub:#7A6855;--borda:#E2D9CC}
    body{font-family:'DM Sans',sans-serif;background:var(--bege);min-height:100vh;padding-bottom:100px}

    /* HEADER */
    .header{background:var(--marrom);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .header-esq{display:flex;align-items:center;gap:10px}
    .header-logo{width:36px;height:36px;border-radius:50%;object-fit:contain;background:var(--bege);padding:2px}
    .header-titulo{color:var(--bege);font-size:14px;font-weight:500}
    .header-sub{color:#C9B99A;font-size:11px}
    .header-dir{display:flex;align-items:center;gap:8px}
    .btn-icon{background:none;border:none;cursor:pointer;color:var(--bege);padding:4px;opacity:.85;display:flex;align-items:center}
    .btn-icon:hover{opacity:1}
    .btn-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* CORPO */
    .corpo{padding:14px}

    /* ESTOQUE */
    .secao-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .secao-titulo{font-size:11px;font-weight:500;color:var(--texto-sub);text-transform:uppercase;letter-spacing:.06em}
    .btn-editar{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--borda);background:var(--bege-card);color:var(--marrom);cursor:pointer;font-family:'DM Sans',sans-serif}

    .estoque-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
    @media(min-width:480px){.estoque-grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:700px){.estoque-grid{grid-template-columns:repeat(6,1fr)}}
    .estoque-item{background:var(--bege-card);border-radius:12px;border:1px solid var(--borda);padding:12px 14px;display:flex;align-items:center;gap:12px}
    .estoque-item.zerado{background:#FDECEA}
    .estoque-item.baixo{background:#FEF7E0}
    .ei-num{font-size:28px;font-weight:500;color:var(--marrom);line-height:1;flex-shrink:0;min-width:32px}
    .estoque-item.zerado .ei-num{color:var(--vermelho)}
    .estoque-item.baixo .ei-num{color:var(--amarelo)}
    .ei-info{flex:1}
    .ei-nome{font-size:12px;font-weight:500;color:var(--texto);line-height:1.2}
    .ei-total{font-size:10px;color:var(--texto-sub);margin-top:2px}

    /* FILTROS */
    .filtros-wrap{overflow-x:auto;margin-bottom:10px}
    .filtros{display:flex;gap:6px;width:max-content}
    .filtro{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--borda);background:var(--bege-card);color:var(--texto-sub);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
    .filtro.ativo{background:var(--marrom);color:var(--bege);border-color:var(--marrom)}

    /* CARDS RESERVA */
    .reserva-card{background:var(--bege-card);border-radius:12px;border:1px solid var(--borda);margin-bottom:10px;overflow:hidden}
    .rc-header{padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid #F5F0E8}
    .rc-cliente{font-size:14px;font-weight:500;color:var(--texto)}
    .rc-tel{font-size:11px;color:var(--texto-sub);margin-top:2px}
    .rc-badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;max-width:160px}
    .badge{font-size:9px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .badge-encomendado{background:#EDE9FE;color:#5B21B6}
    .badge-pronto{background:#FEF7E0;color:#7A5700}
    .badge-embalado{background:#E8F5EE;color:#1B5E35}
    .badge-entregue,.badge-retirado{background:#F1EFE8;color:#7A6855}
    .badge-pago{background:#E8F5EE;color:#1B5E35}
    .badge-npago{background:#FDECEA;color:#8B1A1A}
    .badge-entrega{background:#EDE9FE;color:#5B21B6}
    .badge-retirada{background:#F5F0E8;color:#7A6855}

    .rc-itens{padding:8px 12px;display:flex;flex-direction:column;gap:3px;border-bottom:1px solid #F5F0E8}
    .rc-item{font-size:12px;color:var(--texto)}
    .rc-item span{color:var(--texto-sub)}
    .rc-end{font-size:11px;color:var(--texto-sub);padding:6px 12px;border-bottom:1px solid #F5F0E8;font-style:italic}

    .rc-acoes{padding:8px 12px;display:flex;gap:6px;background:#F9F7F4}
    .btn-acao{font-size:11px;font-weight:500;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;flex:1;text-align:center;transition:opacity .15s}
    .btn-acao:active{opacity:.8}
    .btn-avancar{background:var(--marrom);color:var(--bege)}
    .btn-pago{background:#E8F5EE;color:#1B5E35;border:1px solid #9FE1CB}
    .btn-cancelar-res{background:#FDECEA;color:#8B1A1A;border:1px solid #F5C4C4}

    .vazio{text-align:center;padding:40px 20px;color:var(--texto-sub);font-size:13px}
    .loading-wrap{text-align:center;padding:32px;color:var(--texto-sub);font-size:13px}

    /* FAB */
    .fab{position:fixed;bottom:20px;left:0;right:0;padding:0 14px;z-index:9}
    .btn-nova{background:var(--marrom);color:var(--bege);border:none;border-radius:12px;padding:14px;width:100%;max-width:480px;display:block;margin:0 auto;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
    .btn-nova:hover{background:var(--marrom-mid)}

    /* MODAIS */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
    .modal-bg.visivel{display:flex}
    .modal{background:var(--bege-card);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;animation:slideUp .22s ease;max-height:88vh;overflow-y:auto}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-titulo{font-size:15px;font-weight:500;color:var(--texto);margin-bottom:18px}
    .campo{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .campo label{font-size:11px;font-weight:500;color:var(--texto-sub);text-transform:uppercase;letter-spacing:.06em}
    .campo input,.campo select{font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 13px;border:1.5px solid var(--borda);border-radius:10px;background:var(--bege);color:var(--texto);outline:none;-webkit-appearance:none;width:100%}
    .campo input:focus,.campo select:focus{border-color:var(--marrom)}
    .campo-oculto{display:none}
    .campo-oculto.visivel{display:flex}

    .item-sel{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bege);border-radius:9px;margin-bottom:6px;border:1px solid var(--borda)}
    .item-sel.esgotado{opacity:.5}
    .is-info{flex:1}
    .is-nome{font-size:13px;font-weight:500;color:var(--texto)}
    .is-saldo{font-size:10px;color:var(--texto-sub);margin-top:2px}
    .is-saldo.zero{color:var(--vermelho)}
    .is-ctrl{display:flex;align-items:center;gap:8px}
    .is-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--borda);background:var(--bege-card);font-size:16px;color:var(--marrom);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
    .is-btn:disabled{opacity:.35;cursor:not-allowed}
    .is-qtd{font-size:14px;font-weight:500;color:var(--texto);min-width:20px;text-align:center}

    .modal-btns{display:flex;gap:10px;margin-top:16px}
    .btn-cancelar{flex:1;padding:13px;background:none;border:1.5px solid var(--borda);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--texto-sub);cursor:pointer}
    .btn-confirmar{flex:2;padding:13px;background:var(--marrom);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--bege);cursor:pointer}
    .btn-confirmar:disabled{opacity:.5;cursor:not-allowed}

    /* MODAL ESTOQUE */
    .estoque-input-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bege);border-radius:9px;margin-bottom:6px}
    .ei-label{font-size:13px;font-weight:500;color:var(--texto)}
    .ei-input{width:70px;font-family:'DM Sans',sans-serif;font-size:14px;padding:7px 10px;border:1.5px solid var(--borda);border-radius:8px;background:var(--bege-card);color:var(--texto);outline:none;text-align:center}
    .ei-input:focus{border-color:var(--marrom)}
  </style>
</head>

      </div>
      <div style="font-size:11px;font-weight:500;color:var(--texto-sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Itens</div>
      <div id="itens-sel"></div>
      <div class="modal-btns">
        <button class="btn-cancelar" onclick="fecharModal('modal-reserva')">Cancelar</button>
        <button class="btn-confirmar" id="btn-confirmar-res" onclick="confirmarReserva()">Confirmar reserva</button>
      </div>
    </div>
  </div>

  <!-- Modal Estoque -->
  <div class="modal-bg" id="modal-estoque" onclick="fecharModalFora(event,'modal-estoque')">
    <div class="modal">
      <div class="modal-titulo">Estoque do dia</div>
      <div id="estoque-inputs"></div>
      <div class="modal-btns">
        <button class="btn-cancelar" onclick="fecharModal('modal-estoque')">Cancelar</button>
        <button class="btn-confirmar" onclick="salvarEstoque()">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, deleteDoc,
      collection, query, where, onSnapshot, orderBy, serverTimestamp, increment
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig={apiKey:"AIzaSyCuDpg9yufiKQ_p_KDR2PcY32K8Xh0H_nM",authDomain:"comandas-89c57.firebaseapp.com",projectId:"comandas-89c57",storageBucket:"comandas-89c57.firebasestorage.app",messagingSenderId:"885510017154",appId:"1:885510017154:web:2c7df4579fe5396de5649b"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);

    // Produtos para reserva — porcao_cs consome múltiplas unidades do estoque coxa_sobrecoxa
    const PRODUTOS=[
      {id:'frango',         nome:'Frango inteiro',        estoqueId:'frango',         unidades:1},
      {id:'porcao_cs1',     nome:'Porção C/S c/1',        estoqueId:'coxa_sobrecoxa', unidades:1},
      {id:'porcao_cs3',     nome:'Porção C/S c/3',        estoqueId:'coxa_sobrecoxa', unidades:3},
      {id:'porcao_cs4',     nome:'Porção C/S c/4',        estoqueId:'coxa_sobrecoxa', unidades:4},
      {id:'costela',        nome:'Costela assada',         estoqueId:'costela',        unidades:1},
      {id:'cupim',          nome:'Cupim assado',           estoqueId:'cupim',          unidades:1},
      {id:'joelho',         nome:'Joelho de Porco',        estoqueId:'joelho',         unidades:1},
      {id:'lasanha',        nome:'Lasanha',                estoqueId:'lasanha',        unidades:1},
      {id:'escondidinho',   nome:'Escondidinho',           estoqueId:'escondidinho',   unidades:1},
    ];

    // Itens de estoque — coxa_sobrecoxa é único controlado em unidades
    const ESTOQUE_ITENS=[
      {id:'frango',         nome:'Frango'},
      {id:'coxa_sobrecoxa', nome:'Coxa/Sobrecoxa (un)'},
      {id:'costela',        nome:'Costela'},
      {id:'cupim',          nome:'Cupim'},
      {id:'joelho',         nome:'Joelho'},
      {id:'lasanha',        nome:'Lasanha'},
      {id:'escondidinho',   nome:'Escondidinho'},
    ];

    const hoje=new Date().toISOString().slice(0,10);
    const docEstoque=doc(db,'assados_estoque',hoje);
    let estoqueAtual={}, filtroAtivo='todos', qtdSel={};

    // Data no header
    const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const d=new Date();
    document.getElementById('header-data').textContent=
      `${dias[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;

    onAuthStateChanged(auth,(user)=>{
      if(!user){window.location.href='index.html';return;}
      escutarEstoque();
      escutarReservas();
    });

    function escutarEstoque(){
      onSnapshot(docEstoque,(snap)=>{
        estoqueAtual=snap.exists()?snap.data():{};
        renderEstoque();
      });
    }

    function renderEstoque(){
      const grid=document.getElementById('estoque-grid');
      // Só exibe produtos que foram iniciados no dia (existem no Firestore)
      const itensVisiveis=ESTOQUE_ITENS.filter(p=>estoqueAtual[p.id]!==undefined&&estoqueAtual[p.id]?.oculto!==true);
      if(itensVisiveis.length===0){
        grid.innerHTML='<div style="text-align:center;padding:20px;color:var(--texto-sub);font-size:13px">Estoque do dia ainda não foi configurado.<br>Toque em ✏️ Editar para começar.</div>';
        return;
      }
      grid.innerHTML=itensVisiveis.map(p=>{
        const disp=estoqueAtual[p.id]?.disponivel||0;
        const res=estoqueAtual[p.id]?.reservado||0;
        const saldo=Math.max(0,disp-res);
        const pct=disp>0?Math.round((saldo/disp)*100):0;
        const cls=saldo<=0?'zerado':pct<=30?'baixo':'';
        
        const sufixo=p.id==='coxa_sobrecoxa'?' un':'';
        const btnOcultar=saldo<=0?`<button style="font-size:10px;margin-top:4px;padding:2px 8px;border-radius:6px;border:1px solid #E2D9CC;background:none;color:#7A6855;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="ocultarItem('${p.id}')">Ocultar</button>`:'';
        return `<div class="estoque-item ${cls}" id="ei-card-${p.id}">
          <div class="ei-num">${saldo}</div>
          <div class="ei-info">
            <div class="ei-nome">${p.nome}</div>
            <div class="ei-total">de ${disp}${sufixo}</div>
            ${btnOcultar}
          </div>
        </div>`;
      }).join('');
    }

    function escutarReservas(){
      const q=query(collection(db,'assados_reservas'),orderBy('criadoEm','desc'));
      onSnapshot(q,(snap)=>{
        const todas=snap.docs.map(d=>({id:d.id,...d.data()}));
        renderReservas(todas);
      });
    }

    function renderReservas(todas){
      const filtradas=filtroAtivo==='todos'?todas:
        filtroAtivo==='entregue'?todas.filter(r=>r.status==='entregue'||r.status==='retirado'):
        todas.filter(r=>r.status===filtroAtivo);

      const el=document.getElementById('lista-reservas');
      if(filtradas.length===0){el.innerHTML='<div class="vazio">Nenhuma reserva encontrada</div>';return;}

      const statusLabel={encomendado:'Encomendado',pronto:'Pronto',embalado:'Embalado',entregue:'Entregue',retirado:'Retirado'};
      const proximoStatus={encomendado:'pronto',pronto:'embalado',embalado:null};
      const proximoLabel={encomendado:'→ Marcar Pronto',pronto:'→ Marcar Embalado',embalado:null};

      el.innerHTML=filtradas.map(r=>{
        const endTxt=r.tipo==='entrega'&&r.cliente?.endereco?` <span class="rc-sep">·</span> <span class="rc-end">📍 ${r.cliente.endereco}</span>`:'';

        const linha1=`
          <span class="rc-cliente">${r.cliente?.nome||'—'}</span>
          ${r.cliente?.telefone?`<span class="rc-sep">·</span><span class="rc-tel">${r.cliente.telefone}</span>`:''}
          ${endTxt}`;

        const linha2=`
          <span class="badge badge-${r.pago?'pago':'npago'}">${r.pago?'Pago':'Não pago'}</span>
          <span class="badge badge-${r.tipo}">${r.tipo==='entrega'?'Entrega':'Retirada'}</span>
          <span class="badge badge-${r.status}">${statusLabel[r.status]||r.status}</span>`;

        const btnAvancar=proximoStatus[r.status]?
          `<button class="btn-acao btn-avancar" onclick="avancarStatus('${r.id}','${r.status}','${r.tipo}')">${proximoLabel[r.status]}</button>`:'';
        const btnFinalizar=r.status==='embalado'?
          `<button class="btn-acao btn-avancar" onclick="finalizarReserva('${r.id}','${r.tipo}')">${r.tipo==='entrega'?'→ Entregue':'→ Retirado'}</button>`:'';
        const btnPago=!r.pago?
          `<button class="btn-acao btn-pago" onclick="marcarPago('${r.id}')">Pago ✓</button>`:'';
        const btnCancelar=r.status!=='entregue'&&r.status!=='retirado'?
          `<button class="btn-acao btn-cancelar-res" onclick="cancelarReserva('${r.id}',${JSON.stringify(r.itens||[])})">✕</button>`:'';

        const acoesBtns=`${btnAvancar}${btnFinalizar}${btnPago}${btnCancelar}`;

        const itens=(r.itens||[]).map((item,idx)=>{
          const prod=PRODUTOS.find(p=>p.id===item.produto);
          const btns=idx===0?`<div class="item-btns">${acoesBtns}</div>`:'';
          return `<div class="rc-item-row">
            <span class="rc-item-txt">${item.quantidade}x <span>${prod?.nome||item.produto}</span></span>
            ${btns}
          </div>`;
        }).join('');

        return `<div class="reserva-card">
          <div class="rc-header">
            <div class="rc-linha1">${linha1}</div>
            <div class="rc-linha2">${linha2}</div>
          </div>
          <div class="rc-itens">${itens}</div>
        </div>`;
      }).join('');
    }

    window.filtrar=function(btn,status){
      document.querySelectorAll('.filtro').forEach(b=>b.classList.remove('ativo'));
      btn.classList.add('ativo');
      filtroAtivo=status;
      // Forçar re-render — o onSnapshot já tem os dados
      const q=query(collection(db,'assados_reservas'),orderBy('criadoEm','desc'));
      getDoc(doc(db,'assados_reservas','_dummy')).catch(()=>{});
      // Rebuscar
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({getDocs,query:q2,collection:col,orderBy:ob})=>{
        getDocs(q2(col(db,'assados_reservas'),ob('criadoEm','desc'))).then(snap=>{
          renderReservas(snap.docs.map(d=>({id:d.id,...d.data()})));
        });
      });
    };

    window.avancarStatus=async function(id,statusAtual,tipo){
      const prox={encomendado:'pronto',pronto:'embalado'};
      await updateDoc(doc(db,'assados_reservas',id),{status:prox[statusAtual]});
    };

    window.finalizarReserva=async function(id,tipo){
      await updateDoc(doc(db,'assados_reservas',id),{status:tipo==='entrega'?'entregue':'retirado'});
    };

    window.marcarPago=async function(id){
      await updateDoc(doc(db,'assados_reservas',id),{pago:true});
    };

    window.cancelarReserva=async function(id,itens){
      if(!confirm('Cancelar esta reserva? O estoque será devolvido.')) return;
      // Devolver saldo — usando estoqueId e multiplicando por unidades
      const incs={};
      (itens||[]).forEach(i=>{
        const prod=PRODUTOS.find(p=>p.id===i.produto);
        const estoqueId=prod?.estoqueId||i.produto;
        const unidades=prod?.unidades||1;
        if(!incs[estoqueId]) incs[estoqueId]=0;
        incs[estoqueId]-=i.quantidade*unidades;
      });
      const updates={};
      Object.entries(incs).forEach(([k,v])=>{updates[`${k}.reservado`]=increment(v);});
      if(Object.keys(updates).length) await updateDoc(docEstoque,updates);
      await deleteDoc(doc(db,'assados_reservas',id));
    };

    // MODAL RESERVA
    window.abrirModalReserva=function(){
      qtdSel={};
      document.getElementById('r-nome').value='';
      document.getElementById('r-tel').value='';
      document.getElementById('r-tipo').value='retirada';
      document.getElementById('r-end').value='';
      document.getElementById('r-pago').value='false';
      document.getElementById('campo-endereco').classList.remove('visivel');
      renderItensSel();
      document.getElementById('modal-reserva').classList.add('visivel');
    };

    function renderItensSel(){
      const el=document.getElementById('itens-sel');
      el.innerHTML=PRODUTOS.map(p=>{
        const disp=estoqueAtual[p.estoqueId]?.disponivel||0;
        const res=estoqueAtual[p.estoqueId]?.reservado||0;
        const saldoUn=Math.max(0,disp-res);
        // Saldo em porções = quantas porções cabem com as unidades disponíveis
        const saldoPorcoes=Math.floor(saldoUn/p.unidades);
        const esgotado=saldoPorcoes<=0;
        qtdSel[p.id]=qtdSel[p.id]||0;
        const saldoLabel=p.unidades>1?`Saldo: ${saldoPorcoes} porções (${saldoUn} un)`:`Saldo: ${saldoUn}`;
        return `<div class="item-sel ${esgotado?'esgotado':''}">
          <div class="is-info">
            <div class="is-nome">${p.nome}</div>
            <div class="is-saldo ${esgotado?'zero':''}">${esgotado?'Esgotado':saldoLabel}</div>
          </div>
          <div class="is-ctrl">
            <button class="is-btn" onclick="alterarSel('${p.id}',-1,${saldoPorcoes})" ${esgotado?'disabled':''}>−</button>
            <span class="is-qtd" id="sel-${p.id}">${qtdSel[p.id]||0}</span>
            <button class="is-btn" onclick="alterarSel('${p.id}',1,${saldoPorcoes})" ${esgotado?'disabled':''}>+</button>
          </div>
        </div>`;
      }).join('');
    }

    window.alterarSel=function(id,delta,saldo){
      qtdSel[id]=Math.max(0,Math.min(saldo,(qtdSel[id]||0)+delta));
      const el=document.getElementById('sel-'+id);
      if(el) el.textContent=qtdSel[id];
    };

    window.toggleEndereco=function(){
      const tipo=document.getElementById('r-tipo').value;
      document.getElementById('campo-endereco').classList.toggle('visivel',tipo==='entrega');
    };

    window.confirmarReserva=async function(){
      const nome=document.getElementById('r-nome').value.trim();
      const tel=document.getElementById('r-tel').value.trim();
      const tipo=document.getElementById('r-tipo').value;
      const end=document.getElementById('r-end').value.trim();
      const pago=document.getElementById('r-pago').value==='true';

      if(!nome){alert('Informe o nome do cliente.');return;}
      const itens=Object.entries(qtdSel).filter(([,q])=>q>0).map(([produto,quantidade])=>({produto,quantidade}));
      if(itens.length===0){alert('Selecione ao menos um item.');return;}

      const btn=document.getElementById('btn-confirmar-res');
      btn.disabled=true;btn.textContent='Salvando...';

      try{
        // Criar reserva
        await addDoc(collection(db,'assados_reservas'),{
          cliente:{nome,telefone:tel,endereco:tipo==='entrega'?end:null},
          tipo, pago,
          itens,
          status:'encomendado',
          criadoEm:serverTimestamp()
        });
        // Calcular total a descontar por estoqueId
        const incsReserva={};
        itens.forEach(i=>{
          const prod=PRODUTOS.find(p=>p.id===i.produto);
          const estoqueId=prod?.estoqueId||i.produto;
          const unidades=prod?.unidades||1;
          if(!incsReserva[estoqueId]) incsReserva[estoqueId]=0;
          incsReserva[estoqueId]+=i.quantidade*unidades;
        });
        // Garantir campos numéricos com setDoc merge antes do increment
        const snapEst=await getDoc(docEstoque);
        const estDados=snapEst.exists()?snapEst.data():{};
        const initData={};
        Object.keys(incsReserva).forEach(k=>{
          if(!estDados[k]||typeof estDados[k].reservado!=='number'){
            initData[k]={disponivel:Number(estDados[k]?.disponivel)||0, reservado:0};
          }
        });
        if(Object.keys(initData).length) await setDoc(docEstoque,initData,{merge:true});
        // Incrementar com segurança
        const updatesFinal={};
        Object.entries(incsReserva).forEach(([k,v])=>{updatesFinal[`${k}.reservado`]=increment(v);});
        if(Object.keys(updatesFinal).length){
          await updateDoc(docEstoque,updatesFinal).catch(async()=>{
            await setDoc(docEstoque,{},{merge:true});
            await updateDoc(docEstoque,updatesFinal);
          });
        }
        fecharModal('modal-reserva');
      }catch(e){alert('Erro: '+e.message);}
      btn.disabled=false;btn.textContent='Confirmar reserva';
    };

    // MODAL ESTOQUE
    window.abrirModalEstoque=function(){
      const el=document.getElementById('estoque-inputs');
      el.innerHTML=ESTOQUE_ITENS.map(p=>{
        const disp=estoqueAtual[p.id]?.disponivel||0;
        const oculto=estoqueAtual[p.id]?.oculto===true;
        const toggleVis=oculto?`<div class="toggle-visivel">
          <input type="checkbox" id="vis-${p.id}" checked>
          <label for="vis-${p.id}">Exibir no painel</label>
        </div>`:'';
        return `<div class="estoque-input-row" style="flex-direction:column;align-items:stretch;gap:6px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span class="ei-label">${p.nome}${oculto?' <span style="font-size:10px;color:var(--vermelho)">(oculto)</span>':''}</span>
            <input class="ei-input" type="number" min="0" value="${disp}" id="ei-${p.id}">
          </div>
          ${toggleVis}
        </div>`;
      }).join('');
      document.getElementById('modal-estoque').classList.add('visivel');
    };

    window.salvarEstoque=async function(){
      const dados={};
      ESTOQUE_ITENS.forEach(p=>{
        const val=parseInt(document.getElementById('ei-'+p.id)?.value)||0;
        const res=Number(estoqueAtual[p.id]?.reservado)||0;
        const visCheck=document.getElementById('vis-'+p.id);
        // Se tinha toggle de visibilidade e está marcado para exibir, remover oculto
        const oculto=estoqueAtual[p.id]?.oculto===true;
        const exibir=visCheck?visCheck.checked:true;
        dados[p.id]={disponivel:val,reservado:res,...(oculto&&exibir?{oculto:false}:oculto?{oculto:true}:{})};
      });
      await setDoc(docEstoque,dados,{merge:true});
      fecharModal('modal-estoque');
    };

    window.ocultarItem=async function(id){
      await updateDoc(docEstoque,{[`${id}.oculto`]:true});
    };
    window.fecharModal=function(id){document.getElementById(id).classList.remove('visivel');};
    window.fecharModalFora=function(e,id){if(e.target===document.getElementById(id))window.fecharModal(id);};

    document.addEventListener('keydown',e=>{
      if(e.key==='Escape'){fecharModal('modal-reserva');fecharModal('modal-estoque');}
    });
  </script>
</body>
</html>
